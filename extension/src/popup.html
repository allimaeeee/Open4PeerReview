<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OER Review Console</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      min-height: 120px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #1a202c;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      background: #3D6FA9;
      color: #fff;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #C4622D;
      flex-shrink: 0;
    }

    .header-title {
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.01em;
      flex: 1;
    }

    .body { padding: 14px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #a0aec0;
      flex-shrink: 0;
    }

    .status-dot.active { background: #38a169; }

    .status-text { font-size: 12px; color: #4a5568; flex: 1; }

    .user-email { font-size: 11px; color: #718096; margin-bottom: 14px; }

    .review-box {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }

    .review-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #a0aec0; margin-bottom: 4px; }
    .review-title { font-size: 13px; font-weight: 600; color: #2d3748; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .review-rubric { font-size: 11px; color: #718096; margin-top: 2px; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.15s;
    }

    .btn-outline {
      background: #f7fafc;
      color: #4a5568;
      border: 1px solid #e2e8f0;
    }
    .btn-outline:hover { background: #edf2f7; }

    .btn-danger {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #fed7d7;
    }
    .btn-danger:hover { background: #fed7d7; }

    .divider { height: 1px; background: #f0f4f8; margin: 12px 0; }

    .state-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e2e8f0;
      border-top-color: #3D6FA9;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Login form */
    .form-group { margin-bottom: 10px; }
    .form-label { display: block; font-size: 11px; font-weight: 600; color: #4a5568; margin-bottom: 4px; }
    .input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      color: #1a202c;
      background: #fff;
      outline: none;
      font-family: inherit;
    }
    .input:focus { border-color: #3D6FA9; }

    .btn-primary {
      background: #3D6FA9;
      color: #fff;
    }
    .btn-primary:hover { background: #2c5f96; }

    .error-msg { font-size: 11px; color: #c53030; margin-bottom: 8px; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-dot"></div>
    <span class="header-title">OER Review Console</span>
  </div>
  <div id="app" class="body">
    <div class="state-loading">
      <div class="spinner"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
